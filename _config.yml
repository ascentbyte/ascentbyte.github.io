remote_theme: cotes2020/chirpy@v7.2.0

lang: zh-CN
timezone:

title: Ascentbyte Blog
tagline: 安全小兵的成长笔记
description: >-
  记录从基础编程、Windows 内部机制、内存取证、应急响应到自研安全工具的完整学习过程。

url: "https://ascentbyte.github.io"
baseurl: ""

github:
  username: ascentbyte

twitter:
  username: AscentByte

social:
  name: Ascentbyte
  email: ascentbyte@foxmail.com
  links:
    - https://x.com/AscentByte
    - https://github.com/ascentbyte

avatar: /assets/images/avatar.png
bio: "Windows 开发 / 内存取证 / 应急响应 / 逆向分析 学习中"
location: "Homelab · IR Lab"

social_preview_image:

toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

# ==============================
# Disable PWA & Cache for development
# ==============================
pwa:
  enabled: false
  cache:
    enabled: false
    deny_paths: []

paginate: 10

kramdown:
  footnote_backlink: "↩︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
